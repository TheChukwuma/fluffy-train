spring:
  application:
    name: sample-application
  datasource:
    url: jdbc:h2:mem:sample;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false

core:
  security:
    jwt:
      secret: ${JWT_SECRET:01234567890123456789012345678901}
      expiration-ms: 3600000
    public-path-patterns:
      - /api/public/**
      - /api/auth/**
    user-path-patterns:
      - /api/user/**
    admin-path-patterns:
      - /api/admin/**

logging:
  level:
    com.fluffytrain: INFO
